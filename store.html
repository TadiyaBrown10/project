   <style>
    *{
        box-sizing: border-box; margin: 0; padding: 0;

    body{
        font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        background: skyblue;
    }
    header{
        background: white;
        color: black;
        padding: 15px 20%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top:0;

    }
    h1{
        text-align: center;
        
       
    }
    .product-grid{
        display: grid;
        grid-template-columns: repeat(3,1fr); gap: 20px;padding: 0 10% 50px 10%;
    }
    .card{
        background: whitesmoke;
        border: 20px;
        padding: 30px;
        text-align: center;
        transition: transform 0.3s ease;

    }
    .card:hover{
        transform: translateY(-10px) scale(1.2);
    }
    .card img{
        width: 100%; height:150px; object-fit: contain;
    }
    .buy-btn{
        display: inline-block;
        padding: 10px 10%;
        background: gray;
        color: hotpink;
        text-decoration: none;
        border-radius: 10px;
        margin-top: 15px;
    }
